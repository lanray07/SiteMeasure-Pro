name: iOS Xcode

on:
  push:
    branches:
      - main
    paths:
      - "SiteMeasurePro/**"
      - "SiteMeasurePro.xcodeproj/**"
      - ".github/workflows/ios-xcode.yml"
  pull_request:
    paths:
      - "SiteMeasurePro/**"
      - "SiteMeasurePro.xcodeproj/**"
      - ".github/workflows/ios-xcode.yml"
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: "Archive, export, and upload to App Store Connect"
        required: true
        default: false
        type: boolean
      build_number:
        description: "Optional CFBundleVersion. Defaults to the GitHub run number."
        required: false
        type: string

env:
  PROJECT: SiteMeasurePro.xcodeproj
  SCHEME: SiteMeasurePro
  CONFIGURATION: Release
  BUNDLE_ID: com.lanray07.sitemeasurepro

jobs:
  simulator-build:
    name: Unsigned Simulator Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          mkdir -p build
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            | tee build/simulator-build.log

      - name: Annotate simulator build errors
        if: failure()
        run: |
          if [[ -f build/simulator-build.log ]]; then
            echo "Last 200 lines of simulator build log:"
            tail -200 build/simulator-build.log
            grep -E "^[^:]+:[0-9]+:[0-9]+: (error|warning):" build/simulator-build.log | while IFS= read -r item; do
              file="$(printf "%s" "$item" | cut -d: -f1)"
              line="$(printf "%s" "$item" | cut -d: -f2)"
              col="$(printf "%s" "$item" | cut -d: -f3)"
              level="$(printf "%s" "$item" | cut -d: -f4 | xargs)"
              message="$(printf "%s" "$item" | cut -d: -f5- | xargs)"
              echo "::$level file=$file,line=$line,col=$col::$message"
            done
          fi
          exit 0

      - name: Upload simulator build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-build-log
          path: |
            build/simulator-build.log
          if-no-files-found: warn
          retention-days: 14

  app-store-upload:
    name: Archive and Upload to App Store Connect
    runs-on: macos-26
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_app_store }}

    env:
      ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_APP_STORE_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROFILE_BASE64 }}
      SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.SIGNING_KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          xcode_path="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -print | sort | tail -1)"
          if [[ -z "$xcode_path" && -d /Applications/Xcode.app ]]; then
            if /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild -version | grep -q '^Xcode 26'; then
              xcode_path="/Applications/Xcode.app"
            fi
          fi
          if [[ -z "$xcode_path" ]]; then
            echo "::error::Xcode 26 is required for App Store Connect uploads."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print
            exit 1
          fi
          sudo xcode-select -s "$xcode_path/Contents/Developer"
          xcodebuild -version
          if ! xcodebuild -showsdks | grep -q "iphoneos"; then
            sudo xcodebuild -downloadPlatform iOS
          fi
          xcodebuild -showsdks

      - name: Validate signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY_BASE64 APPLE_TEAM_ID IOS_DISTRIBUTION_CERTIFICATE_BASE64 IOS_DISTRIBUTION_CERTIFICATE_PASSWORD IOS_APP_STORE_PROFILE_BASE64 SIGNING_KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required repository secret for $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Prepare App Store Connect API key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key_path="$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if ! printf "%s" "$ASC_API_KEY_BASE64" | base64 --decode > "$key_path" 2>/dev/null; then
            printf "%s" "$ASC_API_KEY_BASE64" | base64 -D > "$key_path"
          fi
          chmod 600 "$key_path"
          echo "ASC_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Prepare signing assets
        run: |
          set -euo pipefail

          decode_base64() {
            if ! printf "%s" "$1" | base64 --decode > "$2" 2>/dev/null; then
              printf "%s" "$1" | base64 -D > "$2"
            fi
          }

          certificate_path="$RUNNER_TEMP/ios_distribution.p12"
          profile_path="$RUNNER_TEMP/sitemeasurepro_app_store.mobileprovision"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          profile_plist_path="$RUNNER_TEMP/profile.plist"

          decode_base64 "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" "$certificate_path"
          decode_base64 "$IOS_APP_STORE_PROFILE_BASE64" "$profile_path"

          security create-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$SIGNING_KEYCHAIN_PASSWORD" "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist_path"
          profile_uuid=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$profile_plist_path")
          profile_name=$(/usr/libexec/PlistBuddy -c "Print :Name" "$profile_plist_path")
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          {
            echo "CERTIFICATE_PATH=$certificate_path"
            echo "KEYCHAIN_PATH=$keychain_path"
            echo "PROFILE_PATH=$profile_path"
            echo "PROFILE_PLIST_PATH=$profile_plist_path"
            echo "PROFILE_UUID=$profile_uuid"
            echo "PROVISIONING_PROFILE_SPECIFIER=$profile_name"
          } >> "$GITHUB_ENV"

      - name: Resolve build number
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.build_number }}" ]]; then
            echo "BUILD_NUMBER=${{ inputs.build_number }}" >> "$GITHUB_ENV"
          else
            echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          fi

      - name: Archive
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p build/logs
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "build/SiteMeasurePro.xcarchive" \
            -derivedDataPath build/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            | tee build/logs/archive.log

      - name: Create export options
        run: |
          set -euo pipefail
          export_method="app-store"
          if xcodebuild -help 2>/dev/null | grep -q "app-store-connect"; then
            export_method="app-store-connect"
          fi
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>${export_method}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_SPECIFIER}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          plutil -lint build/ExportOptions.plist

      - name: Export IPA
        run: |
          set -euo pipefail
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/SiteMeasurePro.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist \
            | tee build/logs/export.log
          ipa_path="$(find build/export -maxdepth 2 -name '*.ipa' -print -quit)"
          if [[ -z "$ipa_path" ]]; then
            echo "::error::No IPA was produced by xcodebuild -exportArchive"
            exit 1
          fi
          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Upload IPA to App Store Connect
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-upload-artifacts
          path: |
            build/logs/*.log
            build/ExportOptions.plist
            build/export/*.ipa
          if-no-files-found: warn
          retention-days: 7

      - name: Clean up signing assets
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$CERTIFICATE_PATH" "$PROFILE_PATH" "$PROFILE_PLIST_PATH" "$ASC_KEY_PATH"
          if [[ -n "${PROFILE_UUID:-}" ]]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          fi
